name: AI Update Website

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Instruction for AI"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies (no package.json needed)
      - name: Install dependencies
        run: npm install @google/generative-ai dotenv

      # 4. Run your AI script
      - name: Run AI script
        run: node update.js "${{ github.event.inputs.prompt }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 5. Commit & push changes (FIXED VERSION)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI update" || echo "No changes to commit"
          git push
