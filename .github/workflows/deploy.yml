name: AI Update Website

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Instruction for AI"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Run AI script
        run: node update.js "${{ github.event.inputs.prompt }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit changes
        run: |
          git config --global user.name "AI Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "AI update"
          git push
